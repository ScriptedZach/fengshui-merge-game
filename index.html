<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄风合宝 - 风水玄学合并放置游戏</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&display=swap');
        
        :root { --gold: #ffd700; --red: #c8102e; }
        
        body {
            margin: 0; padding: 0;
            background: linear-gradient(135deg, #0a0503, #1f1408);
            color: #f0e6c8;
            font-family: 'Noto Serif SC', serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(to right, #4a1f1f, #9c2a2a);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 5px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        
        h1 { margin: 0; font-size: 32px; text-shadow: 0 0 15px var(--gold); letter-spacing: 2px; }
        
        .currency { font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 10px; text-shadow: 0 0 8px var(--gold); }
        
        .game-container { display: flex; flex: 1; overflow: hidden; }
        
        #board {
            flex: 1;
            background: radial-gradient(circle at 40% 30%, rgba(255,215,0,0.18) 0%, transparent 60%),
                        url('https://picsum.photos/id/1015/1400/900') center/cover;
            position: relative;
            border: 12px solid #3c2a1f;
            margin: 18px;
            border-radius: 16px;
            box-shadow: inset 0 0 100px rgba(0,0,0,0.9);
            overflow: hidden;
        }
        
        .item {
            position: absolute;
            width: 118px; height: 118px;
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            font-size: 38px;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s ease;
            box-shadow: 0 12px 30px rgba(0,0,0,0.85), inset 0 0 35px rgba(255,255,255,0.4);
            border: 8px solid var(--gold);
            color: white;
            text-shadow: 0 2px 8px rgba(0,0,0,0.95);
        }
        
        .item:hover { transform: scale(1.25); z-index: 30; }
        
        .sidebar {
            width: 380px;
            background: rgba(20,12,6,0.97);
            padding: 20px;
            border-left: 6px solid var(--gold);
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }
        
        button {
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s;
            border: none;
        }
        button:hover { transform: translateY(-3px); filter: brightness(1.15); }
        
        .log {
            flex: 1;
            background: rgba(0,0,0,0.45);
            padding: 15px;
            font-size: 14.8px;
            overflow-y: auto;
            border-radius: 10px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <header>
        <h1>🀄 玄风合宝 🀄</h1>
        <div class="currency">💰 人民币 <span id="rmb">0</span></div>
    </header>
    
    <div class="game-container">
        <div id="board"></div>
        
        <div class="sidebar">
            <div style="background:rgba(0,0,0,0.5); padding:16px; border-radius:12px; text-align:center;">
                <p>灵器数量: <span id="totalItems">0</span>/30</p>
                <p>最高品阶: <span id="maxLevel">1</span></p>
                <p>每秒收入: <span id="income">0</span></p>
                <p>下次生成: <span id="timer" style="color:#ffd700; font-size:19px;">5.0</span>s</p>
            </div>
            
            <div>
                <h3 style="margin:8px 0; color:var(--gold);">玄学升级</h3>
                <button id="upgradeSpawnBtn" style="background:#1e5c2b;width:100%;">减少生成间隔<br><small id="spawnCost">¥200</small></button>
                <button id="upgradeStartLevelBtn" style="background:#1e5c2b;width:100%;">提升初始品阶<br><small id="startLevelCost">¥400</small></button>
            </div>
            
            <button id="mergeBtn" style="background:#9c2a2a; font-size:20px; padding:18px;">🔄 全部可融合灵器</button>
            <button id="saveBtn">💾 保存进度</button>
            <button id="loadBtn">📂 加载进度</button>
            
            <div class="log" id="log">欢迎来到玄风合宝...</div>
        </div>
    </div>

    <script>
        // ================== BIG NUMBER SYSTEM (Stable) ==================
        class BigNumber {
            constructor(v = 0) {
                this.m = 0; this.e = 0;
                this.set(v);
            }
            set(v) {
                if (v === 0) return;
                const s = v.toExponential(8).split('e');
                this.m = parseFloat(s[0]);
                this.e = parseInt(s[1]);
            }
            add(v) {
                let o = v instanceof BigNumber ? v : new BigNumber(v);
                if (this.e - o.e > 20) return;
                if (o.e - this.e > 20) { this.m = o.m; this.e = o.e; return; }
                const diff = this.e - o.e;
                this.m += o.m * Math.pow(10, diff);
                while (this.m >= 10) { this.m /= 10; this.e++; }
                while (this.m < 1 && this.m > 0) { this.m *= 10; this.e--; }
            }
            multiply(f) {
                this.m *= f;
                while (this.m >= 10) { this.m /= 10; this.e++; }
            }
            valueOf() { return this.m * Math.pow(10, this.e); }
            toString() {
                if (this.e < 9) return Math.floor(this.m * Math.pow(10, this.e)).toLocaleString('zh-CN');
                return this.m.toFixed(2) + "e" + this.e;
            }
        }

        // Game Variables
        let rmb = new BigNumber(0);
        let items = [];
        let nextId = 1;
        const maxItems = 30;
        
        let spawnIntervalTime = 5000;
        let spawnTimerLeft = spawnIntervalTime;
        let startSpawnLevel = 1;
        let spawnCost = new BigNumber(200);
        let startLevelCost = new BigNumber(400);
        
        const board = document.getElementById('board');
        const logEl = document.getElementById('log');
        
        const itemEmojis = ['🔮','🀄','🐉','🐦‍🔥','☯️','🧿','📿','🪔','🌿','💎','🐢','🦋','🌙','⭐','🪬','🀋','🌟'];
        const levelColors = ["#1e88e5","#43a047","#f9a825","#e64a19","#c2185b","#8e24aa","#00acc1","#ffb300","#d84315","#6d4c41","#3949ab"];

        function formatNumber(bn) { return bn.toString(); }

        function addLog(msg) {
            const time = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
            logEl.innerHTML += `<br>[${time}] ${msg}`;
            logEl.scrollTop = logEl.scrollHeight;
        }

        function getGridPosition(index) {
            const cols = 3;
            const size = 145;
            const offsetX = 70;
            const offsetY = 60;
            return {
                x: offsetX + (index % cols) * size,
                y: offsetY + Math.floor(index / cols) * size
            };
        }

        function repackBoard() {
            items.forEach((item, i) => {
                const pos = getGridPosition(i);
                item.style.left = pos.x + 'px';
                item.style.top = pos.y + 'px';
            });
        }

        function createItem(level = null) {
            if (items.length >= maxItems) return null;
            level = level || startSpawnLevel;
            const pos = getGridPosition(items.length);
            
            const item = document.createElement('div');
            item.className = 'item';
            item.dataset.level = level;
            
            const emoji = itemEmojis[(level-1) % itemEmojis.length];
            const income = Math.pow(3, level-1);
            
            item.innerHTML = `${emoji}<br><small>Lv.${level}</small><br><span style="font-size:13px;">+${income}/s</span>`;
            item.style.backgroundColor = levelColors[(level-1) % levelColors.length];
            item.style.left = `${pos.x}px`;
            item.style.top = `${pos.y}px`;
            
            board.appendChild(item);
            items.push(item);
            updateStats();
            return item;
        }

        function upgradeAllLowerItems(newLevel) {
            items.forEach(item => {
                if (parseInt(item.dataset.level) < newLevel) {
                    item.dataset.level = newLevel;
                    const emoji = itemEmojis[(newLevel-1) % itemEmojis.length];
                    const inc = Math.pow(3, newLevel-1);
                    item.innerHTML = `${emoji}<br><small>Lv.${newLevel}</small><br><span style="font-size:13px;">+${inc}/s</span>`;
                    item.style.backgroundColor = levelColors[(newLevel-1) % levelColors.length];
                }
            });
        }

        function mergeAllPossible() {
            let mergedAny = false;
            let totalReward = new BigNumber(0);
            
            while (true) {
                let did = false;
                for (let i = 0; i < items.length; i++) {
                    for (let j = i+1; j < items.length; j++) {
                        if (parseInt(items[i].dataset.level) === parseInt(items[j].dataset.level)) {
                            const lvl = parseInt(items[i].dataset.level);
                            const reward = new BigNumber(Math.pow(3, lvl-1) * 25);
                            totalReward.add(reward);
                            rmb.add(reward);
                            
                            items[i].remove(); items[j].remove();
                            items.splice(j,1); items.splice(i,1);
                            createItem(lvl + 1);
                            did = true; mergedAny = true;
                            break;
                        }
                    }
                    if (did) break;
                }
                if (!did) break;
            }
            repackBoard();
            updateRMB();
            updateStats();
            if (mergedAny) addLog(`✨ 大融合完成！获得 ${formatNumber(totalReward)} ¥`);
        }

        let spawnInterval;
        function startAutoSpawn() {
            if (spawnInterval) clearInterval(spawnInterval);
            spawnTimerLeft = spawnIntervalTime;
            
            spawnInterval = setInterval(() => {
                spawnTimerLeft -= 50;
                if (spawnTimerLeft <= 0) {
                    createItem();
                    spawnTimerLeft = spawnIntervalTime;
                    repackBoard();
                }
                document.getElementById('timer').textContent = (spawnTimerLeft / 1000).toFixed(1);
            }, 50);
        }

        function updateUpgradeButtons() {
            document.getElementById('upgradeSpawnBtn').style.backgroundColor = (rmb.valueOf() >= spawnCost.valueOf()) ? "#27ae60" : "#555";
            document.getElementById('upgradeStartLevelBtn').style.backgroundColor = (rmb.valueOf() >= startLevelCost.valueOf()) ? "#27ae60" : "#555";
        }

        // Upgrades
        document.getElementById('upgradeSpawnBtn').onclick = () => {
            if (rmb.valueOf() >= spawnCost.valueOf()) {
                rmb = new BigNumber(rmb.valueOf() - spawnCost.valueOf());
                spawnIntervalTime = Math.max(400, Math.floor(spawnIntervalTime * 0.72));
                spawnCost.multiply(2.45);
                document.getElementById('spawnCost').textContent = `¥${formatNumber(spawnCost)}`;
                startAutoSpawn();
                updateRMB();
                addLog(`生成间隔减少`);
            }
        };

        document.getElementById('upgradeStartLevelBtn').onclick = () => {
            if (rmb.valueOf() >= startLevelCost.valueOf()) {
                rmb = new BigNumber(rmb.valueOf() - startLevelCost.valueOf());
                startSpawnLevel++;
                startLevelCost.multiply(2.65);
                document.getElementById('startLevelCost').textContent = `¥${formatNumber(startLevelCost)}`;
                upgradeAllLowerItems(startSpawnLevel);
                repackBoard();
                updateRMB();
                addLog(`初始品阶提升至 Lv.${startSpawnLevel}`);
            }
        };

        document.getElementById('mergeBtn').onclick = mergeAllPossible;

        // Save & Load
        document.getElementById('saveBtn').onclick = () => {
            const data = {
                rmbM: rmb.m, rmbE: rmb.e,
                spawnIntervalTime, startSpawnLevel,
                spawnCM: spawnCost.m, spawnCE: spawnCost.e,
                startCM: startLevelCost.m, startCE: startLevelCost.e,
                items: items.map(i => parseInt(i.dataset.level))
            };
            localStorage.setItem('fengshuiSave_v8', JSON.stringify(data));
            addLog("💾 进度已保存");
        };

        document.getElementById('loadBtn').onclick = () => {
            const d = JSON.parse(localStorage.getItem('fengshuiSave_v8'));
            if (!d) return addLog("没有找到存档");
            
            items.forEach(i => i.remove());
            items = [];
            
            rmb = new BigNumber(0); rmb.m = d.rmbM || 0; rmb.e = d.rmbE || 0;
            spawnIntervalTime = d.spawnIntervalTime || 5000;
            startSpawnLevel = d.startSpawnLevel || 1;
            
            spawnCost = new BigNumber(0); spawnCost.m = d.spawnCM || 200; spawnCost.e = d.spawnCE || 0;
            startLevelCost = new BigNumber(0); startLevelCost.m = d.startCM || 400; startLevelCost.e = d.startCE || 0;
            
            if (d.items) d.items.forEach(lvl => createItem(lvl));
            
            updateRMB(); updateStats(); startAutoSpawn();
            addLog("📂 进度已加载");
        };

        function updateRMB() {
            document.getElementById('rmb').textContent = formatNumber(rmb);
            updateUpgradeButtons();
        }

        function updateStats() {
            document.getElementById('totalItems').textContent = items.length;
            let max = 1;
            items.forEach(i => max = Math.max(max, parseInt(i.dataset.level)));
            document.getElementById('maxLevel').textContent = max;
        }

        // Income
        setInterval(() => {
            let total = 0;
            items.forEach(item => total += Math.pow(3, parseInt(item.dataset.level) - 1));
            rmb.add(total / 10);
            document.getElementById('income').textContent = formatNumber(new BigNumber(total));
            updateRMB();
        }, 100);

        function initGame() {
            for (let i = 0; i < 3; i++) createItem(1);
            updateRMB();
            updateStats();
            startAutoSpawn();
            addLog("玄风合宝已完全启动！祝你财运亨通，风生水起！");
        }

        window.onload = initGame;
    </script>
</body>
</html>
