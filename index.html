<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄风合宝 - 风水玄学合并放置游戏</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
        
        :root { --gold: #ffd700; --red: #c8102e; }
        
        body {
            margin: 0; padding: 0;
            background: linear-gradient(#0f0a05, #2c1e14);
            color: #eeddaa;
            font-family: 'Noto Serif SC', serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        header {
            background: rgba(200, 16, 46, 0.95);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--gold);
        }
        
        h1 { margin: 0; font-size: 28px; text-shadow: 0 0 10px var(--gold); }
        
        .currency { font-size: 26px; display: flex; align-items: center; gap: 8px; }
        
        .game-container { display: flex; flex: 1; overflow: hidden; }
        
        #board {
            flex: 1;
            background: radial-gradient(circle at 30% 40%, rgba(255,215,0,0.15) 0%, transparent 50%),
                        url('https://picsum.photos/id/1015/1200/800') center/cover;
            position: relative;
            border: 8px solid #3c2a1f;
            margin: 15px;
            border-radius: 12px;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        
        .item {
            position: absolute;
            width: 88px; height: 88px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.8), inset 0 0 25px rgba(255,255,255,0.5);
            border: 6px solid var(--gold);
            flex-direction: column;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
            font-weight: bold;
        }
        
        .item:hover { transform: scale(1.22); z-index: 30; }
        
        .sidebar {
            width: 340px;
            background: rgba(26,15,8,0.95);
            padding: 15px;
            border-left: 4px solid var(--gold);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }
        
        button {
            padding: 14px;
            font-size: 17px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
            border: none;
            font-family: 'Noto Serif SC', serif;
        }
        button:hover { transform: translateY(-2px); }
        
        .log {
            flex: 1;
            background: rgba(0,0,0,0.4);
            padding: 12px;
            font-size: 14.5px;
            overflow-y: auto;
            border-radius: 8px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <header>
        <h1>🀄 玄风合宝 🀄</h1>
        <div class="currency">💰 人民币 <span id="rmb">0</span></div>
    </header>
    
    <div class="game-container">
        <div id="board"></div>
        
        <div class="sidebar">
            <div style="background:rgba(0,0,0,0.4);padding:12px;border-radius:8px;">
                <p>灵器数量: <span id="totalItems">0</span>/30</p>
                <p>最高品阶: <span id="maxLevel">1</span></p>
                <p>每秒收入: <span id="income">0</span> ¥</p>
                <p>下次生成: <span id="timer">5.0</span>s</p>
            </div>
            
            <div>
                <h3>玄学升级</h3>
                <button id="upgradeSpawnBtn">减少生成间隔<br><small id="spawnCost">¥180</small></button>
                <button id="upgradeStartLevelBtn">提升初始品阶<br><small id="startLevelCost">¥350</small></button>
            </div>
            
            <button id="mergeBtn">🔄 全部可融合灵器</button>
            <button id="saveBtn">💾 保存进度</button>
            <button id="loadBtn">📂 加载进度</button>
            
            <div class="log" id="log">游戏已启动...</div>
        </div>
    </div>

    <script>
        let rmb = 880;
        let items = [];
        let nextId = 1;
        const maxItems = 30;
        
        let spawnIntervalTime = 5000;
        let spawnTimerLeft = spawnIntervalTime;
        let startSpawnLevel = 1;
        let spawnCost = 180;
        let startLevelCost = 350;
        
        const board = document.getElementById('board');
        const logEl = document.getElementById('log');
        
        const itemEmojis = ['🔮','🀄','🐉','🐦‍🔥','☯️','🧿','📿','🪔','🌿','💎','🐢','🦋','🌙','⭐','🪬','🀋','🌟'];
        
        const levelColors = [
            "#3498db","#2ecc71","#f1c40f","#e67e22","#e74c3c",
            "#9b59b6","#1abc9c","#f39c12","#d35400","#c0392b",
            "#8e44ad","#16a085","#f39c12","#c0392b","#2c3e50"
        ];
        
        function addLog(msg) {
            const time = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
            logEl.innerHTML += `<br>[${time}] ${msg}`;
            logEl.scrollTop = logEl.scrollHeight;
            if (logEl.children.length > 35) logEl.removeChild(logEl.children[0]);
        }
        
        function getGridPosition(index) {
            const cols = 6;
            const size = 98;
            const offsetX = 35;
            const offsetY = 35;
            const col = index % cols;
            const row = Math.floor(index / cols);
            return { x: offsetX + col * size, y: offsetY + row * size };
        }
        
        function repackBoard() {
            items.forEach((item, index) => {
                const pos = getGridPosition(index);
                item.style.left = pos.x + 'px';
                item.style.top = pos.y + 'px';
            });
        }
        
        function createItem(level = null) {
            if (items.length >= maxItems) return null;
            
            level = level || startSpawnLevel;
            const pos = getGridPosition(items.length);
            
            const item = document.createElement('div');
            item.className = 'item';
            item.dataset.level = level;
            item.dataset.id = nextId++;
            
            const emoji = itemEmojis[(level - 1) % itemEmojis.length];
            const income = Math.pow(3, level - 1);
            
            item.innerHTML = `
                ${emoji}<br>
                <small>Lv.${level}</small><br>
                <span style="font-size:11px; opacity:0.9;">+${income}/s</span>
            `;
            
            item.style.backgroundColor = levelColors[(level - 1) % levelColors.length];
            
            item.style.left = pos.x + 'px';
            item.style.top = pos.y + 'px';
            
            board.appendChild(item);
            items.push(item);
            
            updateStats();
            return item;
        }
        
        function mergeAllPossible() {
            let didMerge = false;
            let totalReward = 0;
            
            // Keep merging while possible
            while (true) {
                let mergedThisLoop = false;
                for (let i = 0; i < items.length; i++) {
                    for (let j = i + 1; j < items.length; j++) {
                        if (parseInt(items[i].dataset.level) === parseInt(items[j].dataset.level)) {
                            const lvl = parseInt(items[i].dataset.level);
                            const reward = Math.pow(3, lvl - 1) * 12;
                            totalReward += reward;
                            rmb += reward;
                            
                            const item1 = items[i];
                            const item2 = items[j];
                            
                            items.splice(j, 1);
                            items.splice(i, 1);
                            item1.remove();
                            item2.remove();
                            
                            createItem(lvl + 1);
                            mergedThisLoop = true;
                            didMerge = true;
                            break;
                        }
                    }
                    if (mergedThisLoop) break;
                }
                if (!mergedThisLoop) break;
            }
            
            repackBoard();
            updateRMB();
            updateStats();
            
            if (didMerge) {
                addLog(`✨ 批量融合完成！获得 ${Math.floor(totalReward)} ¥`);
            } else {
                addLog("当前没有可融合的相同品阶灵器");
            }
        }
        
        // Auto Spawn Timer
        let spawnInterval;
        function startAutoSpawn() {
            if (spawnInterval) clearInterval(spawnInterval);
            spawnTimerLeft = spawnIntervalTime;
            
            spawnInterval = setInterval(() => {
                spawnTimerLeft -= 50;
                if (spawnTimerLeft <= 0) {
                    createItem();
                    spawnTimerLeft = spawnIntervalTime;
                    repackBoard();
                }
                document.getElementById('timer').textContent = (spawnTimerLeft / 1000).toFixed(1);
            }, 50);
        }
        
        function updateUpgradeButtons() {
            const spawnBtn = document.getElementById('upgradeSpawnBtn');
            const startBtn = document.getElementById('upgradeStartLevelBtn');
            
            spawnBtn.style.backgroundColor = rmb >= spawnCost ? "#27ae60" : "#555555";
            startBtn.style.backgroundColor = rmb >= startLevelCost ? "#27ae60" : "#555555";
        }
        
        // Upgrades
        document.getElementById('upgradeSpawnBtn').onclick = () => {
            if (rmb >= spawnCost) {
                rmb -= spawnCost;
                spawnIntervalTime = Math.max(500, Math.floor(spawnIntervalTime * 0.78));
                spawnCost = Math.floor(spawnCost * 1.9);
                document.getElementById('spawnCost').textContent = `¥${spawnCost}`;
                startAutoSpawn();
                updateRMB();
                addLog(`生成间隔减少 → ${(spawnIntervalTime/1000).toFixed(1)}秒`);
            }
        };
        
        document.getElementById('upgradeStartLevelBtn').onclick = () => {
            if (rmb >= startLevelCost) {
                rmb -= startLevelCost;
                startSpawnLevel++;
                startLevelCost = Math.floor(startLevelCost * 2.1);
                document.getElementById('startLevelCost').textContent = `¥${startLevelCost}`;
                updateRMB();
                addLog(`初始灵器品阶提升至 Lv.${startSpawnLevel}`);
            }
        };
        
        document.getElementById('mergeBtn').onclick = mergeAllPossible;
        
        // Save & Load
        document.getElementById('saveBtn').onclick = () => {
            const saveData = {
                rmb: rmb,
                spawnIntervalTime: spawnIntervalTime,
                startSpawnLevel: startSpawnLevel,
                spawnCost: spawnCost,
                startLevelCost: startLevelCost,
                items: items.map(item => parseInt(item.dataset.level))
            };
            localStorage.setItem('fengshuiSave_v3', JSON.stringify(saveData));
            addLog("💾 游戏进度已保存");
        };
        
        document.getElementById('loadBtn').onclick = () => {
            const data = JSON.parse(localStorage.getItem('fengshuiSave_v3'));
            if (!data) return addLog("没有找到存档");
            
            items.forEach(i => i.remove());
            items = [];
            
            rmb = data.rmb || 880;
            spawnIntervalTime = data.spawnIntervalTime || 5000;
            startSpawnLevel = data.startSpawnLevel || 1;
            spawnCost = data.spawnCost || 180;
            startLevelCost = data.startLevelCost || 350;
            
            if (data.items && Array.isArray(data.items)) {
                data.items.forEach(lvl => createItem(lvl));
            }
            
            updateRMB();
            updateStats();
            document.getElementById('spawnCost').textContent = `¥${spawnCost}`;
            document.getElementById('startLevelCost').textContent = `¥${startLevelCost}`;
            startAutoSpawn();
            addLog("📂 进度已加载");
        };
        
        function updateRMB() {
            document.getElementById('rmb').textContent = Math.floor(rmb).toLocaleString('zh-CN');
            updateUpgradeButtons();
        }
        
        function updateStats() {
            document.getElementById('totalItems').textContent = items.length;
            let maxLvl = 1;
            items.forEach(i => {
                const lvl = parseInt(i.dataset.level);
                if (lvl > maxLvl) maxLvl = lvl;
            });
            document.getElementById('maxLevel').textContent = maxLvl;
        }
        
        // Income per second
        setInterval(() => {
            let totalIncome = 0;
            items.forEach(item => {
                const lvl = parseInt(item.dataset.level);
                totalIncome += Math.pow(3, lvl - 1);
            });
            document.getElementById('income').textContent = Math.floor(totalIncome);
            rmb += totalIncome / 20;   // smoother income
            updateRMB();
        }, 50);
        
        // Initialize Game
        function initGame() {
            for (let i = 0; i < 5; i++) {
                createItem(1);
            }
            updateRMB();
            updateStats();
            startAutoSpawn();
            addLog("欢迎来到玄风合宝！灵器会自动生成，点击「全部可融合灵器」进行批量融合");
        }
        
        window.onload = initGame;
    </script>
</body>
</html>
