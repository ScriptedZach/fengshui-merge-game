<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>玄风合宝 - 风水玄学合并放置游戏</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
        
        :root { --gold: #ffd700; --red: #c8102e; }
        
        body {
            margin: 0; padding: 0;
            background: linear-gradient(#0f0a05, #2c1e14);
            color: #eeddaa;
            font-family: 'Noto Serif SC', serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        header {
            background: rgba(200, 16, 46, 0.9);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--gold);
        }
        
        h1 { margin: 0; font-size: 28px; text-shadow: 0 0 10px var(--gold); }
        
        .currency { font-size: 26px; display: flex; align-items: center; gap: 8px; }
        
        .game-container { display: flex; flex: 1; overflow: hidden; }
        
        #board {
            flex: 1;
            background: radial-gradient(circle at 30% 40%, rgba(255,215,0,0.15) 0%, transparent 50%),
                        url('https://picsum.photos/id/1015/1200/800') center/cover;
            position: relative;
            border: 8px solid #3c2a1f;
            margin: 15px;
            border-radius: 12px;
            box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
            overflow: hidden;
        }
        
        .item {
            position: absolute;
            width: 88px; height: 88px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            cursor: pointer;
            user-select: none;
            transition: all 0.25s;
            box-shadow: 0 8px 20px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,255,255,0.4);
            border: 6px solid var(--gold);
        }
        
        .item:hover { transform: scale(1.18); z-index: 20; }
        
        .sidebar {
            width: 320px;
            background: rgba(26,15,8,0.95);
            padding: 15px;
            border-left: 4px solid var(--gold);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }
        
        button {
            background: var(--red);
            color: white;
            border: none;
            padding: 14px;
            font-size: 17px;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        button:hover { background: #ff3333; transform: translateY(-2px); }
        
        .log {
            flex: 1;
            background: rgba(0,0,0,0.4);
            padding: 12px;
            font-size: 14.5px;
            overflow-y: auto;
            border-radius: 8px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <header>
        <h1>🀄 玄风合宝 🀄</h1>
        <div class="currency">💰 人民币 <span id="rmb">0</span></div>
    </header>
    
    <div class="game-container">
        <div id="board"></div>
        
        <div class="sidebar">
            <div style="background:rgba(0,0,0,0.4);padding:12px;border-radius:8px;">
                <p>灵器数量: <span id="totalItems">0</span>/30</p>
                <p>最高品阶: <span id="maxLevel">1</span></p>
                <p>每秒收入: <span id="income">0</span> ¥</p>
            </div>
            
            <button id="spawnInfo">自动生成中... (每 <span id="spawnTime">5</span> 秒)</button>
            
            <div>
                <h3>玄学升级</h3>
                <button id="upgradeSpawnBtn">减少生成间隔<br><small id="spawnCost">¥180</small></button>
                <button id="upgradeStartLevelBtn">提升初始品阶<br><small id="startLevelCost">¥350</small></button>
            </div>
            
            <button id="mergeBtn">🔄 融合选中灵器</button>
            <button id="saveBtn">💾 保存进度</button>
            <button id="loadBtn">📂 加载进度</button>
            
            <div class="log" id="log">游戏已启动...</div>
        </div>
    </div>

    <script>
        let rmb = 880;
        let items = [];
        let nextId = 1;
        const maxItems = 30;
        
        let spawnIntervalTime = 5000;
        let startSpawnLevel = 1;
        let spawnCost = 180;
        let startLevelCost = 350;
        
        const board = document.getElementById('board');
        const itemEmojis = ['🔮','🀄','🐉','🐦‍🔥','☯️','🧿','📿','🪔','🌿','💎','🐢','🦋','🌙','⭐','🪬','🀋','🌟'];
        
        let selectedItems = [];
        let spawnTimer = null;
        
        function addLog(msg) {
            const time = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
            logEl.innerHTML += `<br>[${time}] ${msg}`;
            logEl.scrollTop = logEl.scrollHeight;
        }
        
        const logEl = document.getElementById('log');
        
        function getGridPosition(index) {
            const cols = 6;
            const size = 98;
            const offsetX = 40;
            const offsetY = 40;
            const col = index % cols;
            const row = Math.floor(index / cols);
            return {
                x: offsetX + col * size,
                y: offsetY + row * size
            };
        }
        
        function createItem(level = null) {
            if (items.length >= maxItems) return null;
            
            level = level || startSpawnLevel;
            const pos = getGridPosition(items.length);
            
            const item = document.createElement('div');
            item.className = `item`;
            item.dataset.level = level;
            item.dataset.id = nextId++;
            
            const emoji = itemEmojis[(level-1) % itemEmojis.length];
            item.innerHTML = `${emoji}<br><small>Lv.${level}</small>`;
            
            item.style.left = pos.x + 'px';
            item.style.top = pos.y + 'px';
            
            item.addEventListener('click', () => toggleSelect(item));
            board.appendChild(item);
            items.push(item);
            
            updateStats();
            return item;
        }
        
        function toggleSelect(item) {
            if (selectedItems.includes(item)) {
                selectedItems = selectedItems.filter(i => i !== item);
                item.style.boxShadow = '0 8px 20px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,255,255,0.4)';
            } else {
                if (selectedItems.length >= 2) {
                    selectedItems[0].style.boxShadow = '0 8px 20px rgba(0,0,0,0.7), inset 0 0 20px rgba(255,255,255,0.4)';
                    selectedItems.shift();
                }
                selectedItems.push(item);
                item.style.boxShadow = '0 0 0 6px #ffd700, 0 8px 30px #ffd700';
            }
        }
        
        function mergeItems(a, b) {
            const lvl = parseInt(a.dataset.level);
            if (parseInt(b.dataset.level) !== lvl) {
                addLog("⚠️ 只能融合同品阶的灵器");
                return;
            }
            
            const newLevel = lvl + 1;
            const reward = Math.floor(28 * lvl * lvl);
            rmb += reward;
            
            // Remove old items
            items = items.filter(i => i !== a && i !== b);
            a.remove();
            b.remove();
            selectedItems = [];
            
            // Create new item at a clean grid position
            const newItem = createItem(newLevel);
            if (newItem) addLog(`✨ 融合成功！ Lv.${lvl} → Lv.${newLevel}　+${reward} ¥`);
            
            updateRMB();
            updateStats();
        }
        
        function startAutoSpawn() {
            if (spawnTimer) clearInterval(spawnTimer);
            spawnTimer = setInterval(() => {
                createItem();
            }, spawnIntervalTime);
        }
        
        // Upgrades
        document.getElementById('upgradeSpawnBtn').onclick = () => {
            if (rmb >= spawnCost) {
                rmb -= spawnCost;
                spawnIntervalTime = Math.max(600, Math.floor(spawnIntervalTime * 0.83));
                spawnCost = Math.floor(spawnCost * 1.68);
                document.getElementById('spawnCost').textContent = `¥${spawnCost}`;
                document.getElementById('spawnTime').textContent = (spawnIntervalTime/1000).toFixed(1);
                startAutoSpawn();
                updateRMB();
                addLog(`生成间隔减少至 ${(spawnIntervalTime/1000).toFixed(1)}秒`);
            }
        };
        
        document.getElementById('upgradeStartLevelBtn').onclick = () => {
            if (rmb >= startLevelCost) {
                rmb -= startLevelCost;
                startSpawnLevel++;
                startLevelCost = Math.floor(startLevelCost * 1.78);
                document.getElementById('startLevelCost').textContent = `¥${startLevelCost}`;
                updateRMB();
                addLog(`初始品阶提升至 Lv.${startSpawnLevel}`);
            }
        };
        
        document.getElementById('mergeBtn').onclick = () => {
            if (selectedItems.length === 2) mergeItems(selectedItems[0], selectedItems[1]);
            else addLog("请选择两个相同品阶的灵器");
        };
        
        // Save / Load
        document.getElementById('saveBtn').onclick = () => {
            const saveData = {
                rmb, spawnIntervalTime, startSpawnLevel, spawnCost, startLevelCost,
                items: items.map(item => parseInt(item.dataset.level))
            };
            localStorage.setItem('fengshuiSave', JSON.stringify(saveData));
            addLog("💾 进度已保存");
        };
        
        document.getElementById('loadBtn').onclick = () => {
            const data = JSON.parse(localStorage.getItem('fengshuiSave'));
            if (!data) return addLog("没有找到存档");
            
            // Clear current items
            items.forEach(i => i.remove());
            items = [];
            
            rmb = data.rmb || 880;
            spawnIntervalTime = data.spawnIntervalTime || 5000;
            startSpawnLevel = data.startSpawnLevel || 1;
            spawnCost = data.spawnCost || 180;
            startLevelCost = data.startLevelCost || 350;
            
            if (data.items && Array.isArray(data.items)) {
                data.items.forEach(lvl => createItem(lvl));
            }
            
            updateRMB();
            updateStats();
            document.getElementById('spawnTime').textContent = (spawnIntervalTime/1000).toFixed(1);
            document.getElementById('spawnCost').textContent = `¥${spawnCost}`;
            document.getElementById('startLevelCost').textContent = `¥${startLevelCost}`;
            
            startAutoSpawn();
            addLog("📂 进度已加载");
        };
        
        function updateRMB() {
            document.getElementById('rmb').textContent = Math.floor(rmb).toLocaleString('zh-CN');
        }
        
        function updateStats() {
            document.getElementById('totalItems').textContent = items.length;
            let max = 1;
            items.forEach(i => { if (parseInt(i.dataset.level) > max) max = parseInt(i.dataset.level); });
            document.getElementById('maxLevel').textContent = max;
        }
        
        // Income
        setInterval(() => {
            let income = 0;
            items.forEach(item => {
                const lvl = parseInt(item.dataset.level);
                income += Math.pow(lvl, 1.75) * 0.6;
            });
            const perSec = Math.floor(income);
            document.getElementById('income').textContent = perSec;
            rmb += perSec / 10;
            updateRMB();
        }, 100);
        
        // Init
        function init() {
            for (let i = 0; i < 5; i++) createItem(1);
            updateRMB();
            startAutoSpawn();
            addLog("玄风合宝已启动，灵器自动生成中...");
        }
        
        window.onload = init;
    </script>
</body>
</html>
